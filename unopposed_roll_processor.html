<head>

<title>Unopposed Roll Processor — ZANWHC Mahikeng</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useCallback, useEffect } = React;

// ── SYSTEM PROMPT ──────────────────────────────────────────────────────────
const SYSTEM_PROMPT = `You are a senior judicial research assistant to a Judge of the High Court of South Africa, North West Division (ZANWHC), Mahikeng. You assist on the unopposed / default motion court roll and on admissions of legal practitioners.

Your task: Read the uploaded court document and produce a comprehensive structured assessment. You MUST respond with ONLY valid JSON — no preamble, no markdown, no backticks.

STEP 1 — IDENTIFY MATTER TYPE
Determine whether the matter is:
(a) UNOPPOSED MOTION (default judgment / divorce / interdict / review / declaratory / winding-up / sequestration / eviction / NCA / contempt / ex parte / other)
(b) ADMISSION OF LEGAL PRACTITIONER (LPA 28/2014)
(c) SPECIAL TRIBUNAL — UNOPPOSED

STEP 2 — PROCEDURAL COMPLIANCE CHECK
For ALL matters check:
• Notice of motion / petition filed correctly
• Founding / supporting affidavit deposed and properly commissioned
• Service effected on all parties (Rule 4 compliance)
• Proof of service filed
• Time for opposition has lapsed
• Rule 7 authority filed if applicant is a juristic person
• Draft order filed
• Heads / practice note (if required)

For ADMISSIONS additionally check (LPA s 24):
A. Academic qualifications (LLB or equivalent)
B. Practical vocational training (PLT certificate or candidate attorney service)
C. Admission examination passed (if applicable)
D. LPC vetting certificate issued
E. Fit and proper character — no prior misconduct / criminal record
F. Application in prescribed form — proper affidavit by applicant
G. Supporting affidavit by principal / supervising attorney or employer
H. Proof of practical training / articles / PLT
I. Notice published in Government Gazette (s 24(2))
J. LPC notice confirming no objection
K. Draft order in correct form: full names, ID number, "duly admitted and enrolled as an attorney of this court"

STEP 3 — SUBSTANTIVE REQUIREMENTS

DEFAULT JUDGMENT (liquid document):
• Defendant validly served with summons; Time for appearance/plea expired; No appearance or plea entered
• Cause of action pleaded correctly; Quantum proved; Mora interest rate and date stated

DIVORCE (unopposed):
• Irretrievable breakdown alleged; Marriage details (date + place); Children's interests addressed
• Proprietary consequences addressed; Maintenance addressed; Original/certified marriage certificate in papers

INTERDICT (interim — Setlogelo test):
• Clear right; Reasonable apprehension of harm; Balance of convenience favours applicant
• No adequate alternative remedy; Undertaking to pay damages furnished

WINDING-UP / SEQUESTRATION:
• Jurisdictional facts established; Grounds properly pleaded
• Notices to employees/creditors; CIPC/ITC search annexed; Advantage to creditors addressed

NCA INSTALMENT SALE:
• Credit agreement annexed and compliant; s 86 debt review status addressed
• Section 129 notice sent and received; 10-business-day period lapsed; Arrears quantum stated

EVICTION (PIE Act):
• Ownership/right to occupy established; Notice in terms of s 4(2) PIE Act served
• Municipality served; Circumstances of unlawful occupiers addressed

SPECIAL TRIBUNAL:
• Proclamation number and paragraph cited; SIU as co-applicant or notice given
• Irregular conduct clearly pleaded; Quantum of State loss stated
• Respondent validly served; Relief within Tribunal's jurisdiction (s 8 SIU Act)

STEP 4 — SAFLII CASE LAW
Search SAFLII (saflii.org) for any directly relevant authority. Conduct targeted searches such as:
• site:saflii.org [legal principle] [court]
• site:saflii.org ZANWHC [matter type]
Search for 1–3 relevant cases. If no search is needed, return an empty array.

STEP 5 — RECOMMENDATION
GRANT           — papers in order, all requirements met
GRANT_AMENDED   — papers largely in order but draft order requires amendment before signing
QUERY           — substantial query must be addressed before order granted
POSTPONE        — matter to be postponed (reason stated)
REMOVE          — matter removed from roll (reason stated)

OUTPUT FORMAT — STRICT JSON ONLY:
{
  "caseTitle": "Applicant v Respondent",
  "caseNumber": "XXXX/YYYY",
  "court": "North West Division, Mahikeng",
  "matterType": "e.g. Default Judgment — Liquid Document",
  "dateOnRoll": "DD Month YYYY or unknown",
  "recommendation": "GRANT | GRANT_AMENDED | QUERY | POSTPONE | REMOVE",
  "rollDecision": "GRANT | POSTPONE | REMOVE",
  "assessmentReport": "Full structured assessment text — use \\n for newlines",
  "draftOrder": "Full draft court order text ready for signing — use \\n for newlines",
  "queries": ["Query 1", "Query 2"],
  "amendments": ["Amendment 1"],
  "safliiCases": [
    { "citation": "Case name [year] court", "principle": "Brief relevant principle" }
  ],
  "confidence": "HIGH | MEDIUM | LOW",
  "confidenceNote": "Reason if not HIGH"
}

The assessmentReport field must follow this structure:
══════════════════════════════════════════════════════
UNOPPOSED MOTION ASSESSMENT — ZANWHC
══════════════════════════════════════════════════════
MATTER: [case title]
CASE NUMBER: [number]
TYPE: [matter type]
RECOMMENDATION: [decision]
──────────────────────────────────────────────────────
RELIEF SOUGHT
[state prayers]
──────────────────────────────────────────────────────
PROCEDURAL COMPLIANCE
[checkbox list with ✅ / ❌ / ⚠️]
──────────────────────────────────────────────────────
SUBSTANTIVE REQUIREMENTS
[checkbox list with ✅ / ❌ / ⚠️]
──────────────────────────────────────────────────────
DRAFT ORDER REVIEW
[notes]
──────────────────────────────────────────────────────
QUERIES / CONCERNS
[numbered list or "None."]
══════════════════════════════════════════════════════

The draftOrder field must be a complete, properly formatted High Court order starting with:
"In the High Court of South Africa, North West Division, Mahikeng\\nCase Number: [number]\\n\\nIn the matter between:\\n[APPLICANT] — Applicant\\n[RESPONDENT] — Respondent\\n\\nORDER\\n\\nHaving read the papers filed of record and having considered the matter, the following order is made:\\n\\n1. [relief]\\n2. [costs]\\n\\n______________________________\\nJUDGE\\nActing Deputy Judge President\\nNorth West Division\\n\\nDate: ___________________"

Return ONLY the JSON object. No other text whatsoever.`;

// ── HELPERS ───────────────────────────────────────────────────────────────
const REC_META = {
  GRANT:         { label:"GRANT",           bg:"#14532d", accent:"#4ade80", badge:"#16a34a" },
  GRANT_AMENDED: { label:"GRANT (AMENDED)", bg:"#14532d", accent:"#86efac", badge:"#15803d" },
  QUERY:         { label:"QUERY",           bg:"#7c2d12", accent:"#fb923c", badge:"#c2410c" },
  POSTPONE:      { label:"POSTPONE",        bg:"#1e3a5f", accent:"#60a5fa", badge:"#2563eb" },
  REMOVE:        { label:"REMOVE FROM ROLL",bg:"#450a0a", accent:"#f87171", badge:"#b91c1c" },
};
const recMeta = r => REC_META[r] || { label:r||"PENDING", bg:"#1e293b", accent:"#94a3b8", badge:"#475569" };

function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(",")[1]);
    r.onerror=()=>rej(new Error("File read failed"));
    r.readAsDataURL(file);
  });
}

async function assessMatter(base64Data, mediaType, apiKey){
  const response = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key": apiKey,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true",
    },
    body: JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:4096,
      system: SYSTEM_PROMPT,
      tools:[{ type:"web_search_20250305", name:"web_search" }],
      messages:[{
        role:"user",
        content:[
          { type:"document", source:{ type:"base64", media_type: mediaType, data: base64Data }},
          { type:"text", text:"Please read this court document and produce your full assessment JSON as instructed." }
        ]
      }]
    })
  });
  if(!response.ok){
    const err = await response.json().catch(()=>({}));
    throw new Error(err?.error?.message || `API error ${response.status}`);
  }
  const data = await response.json();
  const textBlocks = (data.content||[]).filter(b=>b.type==="text");
  const raw = textBlocks.map(b=>b.text).join("");
  const clean = raw.replace(/```json|```/gi,"").trim();
  try{ return JSON.parse(clean); }
  catch{
    const match = clean.match(/\{[\s\S]*\}/);
    if(match) return JSON.parse(match[0]);
    throw new Error("Could not parse API response as JSON. The model may have returned an unexpected format.");
  }
}

// ── API KEY MODAL ─────────────────────────────────────────────────────────
function ApiKeyModal({ onSave }){
  const [key,setKey]=useState(()=>localStorage.getItem("zanwhc_api_key")||"");
  const [show,setShow]=useState(false);
  const save=()=>{ if(key.trim()){ localStorage.setItem("zanwhc_api_key",key.trim()); onSave(key.trim()); }};
  return (
    <div style={{position:"fixed",inset:0,background:"#000c",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}}>
      <div style={{background:"#0f1829",border:"1px solid #c9a84c55",borderRadius:10,padding:40,maxWidth:520,width:"90%",animation:"fadeIn 0.3s ease"}}>
        <div style={{fontSize:32,textAlign:"center",marginBottom:12,color:"#c9a84c"}}>⚖</div>
        <div style={{fontSize:20,color:"#c9a84c",textAlign:"center",letterSpacing:"0.08em",marginBottom:6}}>
          UNOPPOSED ROLL PROCESSOR
        </div>
        <div style={{fontSize:11,color:"#64748b",textAlign:"center",letterSpacing:"0.12em",marginBottom:28}}>
          NORTH WEST DIVISION — HIGH COURT OF SOUTH AFRICA
        </div>
        <div style={{fontSize:13,color:"#94a3b8",marginBottom:8,fontFamily:"'Courier New',monospace"}}>
          Anthropic API Key
        </div>
        <div style={{fontSize:11,color:"#475569",marginBottom:14,lineHeight:1.6}}>
          Obtain your key from <a href="https://console.anthropic.com/account/keys" target="_blank"
          style={{color:"#60a5fa"}}>console.anthropic.com</a>. Your key is stored locally in this browser only and never transmitted anywhere except directly to Anthropic.
        </div>
        <div style={{position:"relative",marginBottom:20}}>
          <input
            type={show?"text":"password"}
            value={key}
            onChange={e=>setKey(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&save()}
            placeholder="sk-ant-api03-..."
            style={{width:"100%",padding:"10px 40px 10px 14px",background:"#080d1a",border:"1px solid #1e3a5f",
              borderRadius:5,color:"#e2e8f0",fontSize:13,fontFamily:"'Courier New',monospace",outline:"none"}}
          />
          <button onClick={()=>setShow(s=>!s)}
            style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",
              color:"#475569",cursor:"pointer",fontSize:14}}>
            {show?"🙈":"👁"}
          </button>
        </div>
        <button onClick={save}
          style={{width:"100%",padding:12,background:"linear-gradient(135deg,#92400e,#c9a84c)",border:"none",
            borderRadius:6,color:"#fff",fontSize:14,fontFamily:"Georgia,serif",letterSpacing:"0.08em",
            cursor:"pointer",fontWeight:600}}>
          Enter the Roll Processor
        </button>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────
function App(){
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem("zanwhc_api_key")||"");
  const [matters,setMatters]=useState([]);
  const [processing,setProcessing]=useState(false);
  const [activeTab,setActiveTab]=useState(null);
  const [dragOver,setDragOver]=useState(false);
  const fileRef=useRef();

  const addFiles=useCallback((files)=>{
    const newM=Array.from(files)
      .filter(f=>f.type==="application/pdf"||f.name.endsWith(".pdf"))
      .map(f=>({ id:crypto.randomUUID(), file:f, name:f.name.replace(/\.pdf$/i,""), status:"PENDING", result:null, error:null }));
    setMatters(prev=>{
      const combined=[...prev,...newM];
      if(!activeTab&&combined.length>0) setActiveTab(combined[0].id);
      return combined;
    });
  },[activeTab]);

  const handleDrop=e=>{ e.preventDefault(); setDragOver(false); addFiles(e.dataTransfer.files); };
  const removeMatter=id=>setMatters(prev=>{ const n=prev.filter(m=>m.id!==id); if(activeTab===id) setActiveTab(n[0]?.id||null); return n; });

  const processAll=async()=>{
    const pending=matters.filter(m=>m.status==="PENDING"||m.status==="ERROR");
    if(!pending.length) return;
    setProcessing(true);
    for(const matter of pending){
      setMatters(prev=>prev.map(m=>m.id===matter.id?{...m,status:"PROCESSING"}:m));
      setActiveTab(matter.id);
      try{
        const b64=await fileToBase64(matter.file);
        const result=await assessMatter(b64, matter.file.type||"application/pdf", apiKey);
        setMatters(prev=>prev.map(m=>m.id===matter.id?{...m,status:"DONE",result,error:null}:m));
      }catch(err){
        setMatters(prev=>prev.map(m=>m.id===matter.id?{...m,status:"ERROR",error:err.message}:m));
      }
    }
    setProcessing(false);
  };

  const activeMatter=matters.find(m=>m.id===activeTab);
  const doneCount=matters.filter(m=>m.status==="DONE").length;
  const pendingCount=matters.filter(m=>m.status==="PENDING").length;

  if(!apiKey) return <ApiKeyModal onSave={k=>{setApiKey(k);}}/>;

  return (
    <div style={{minHeight:"100vh",background:"#080d1a",display:"flex",flexDirection:"column"}}>
      {/* HEADER */}
      <header style={{background:"linear-gradient(135deg,#0f1829,#1a2744)",borderBottom:"1px solid #c9a84c44",padding:"0 24px"}}>
        <div style={{maxWidth:1400,margin:"0 auto",display:"flex",alignItems:"center",gap:16,padding:"13px 0",flexWrap:"wrap"}}>
          <svg width="30" height="30" viewBox="0 0 32 32" fill="none">
            <circle cx="16" cy="16" r="15" stroke="#c9a84c" strokeWidth="1.5" fill="none"/>
            <path d="M16 4 L18.5 12 L27 12 L20.5 17 L23 25 L16 20 L9 25 L11.5 17 L5 12 L13.5 12 Z" fill="#c9a84c" opacity="0.85"/>
          </svg>
          <div>
            <div style={{fontSize:17,fontWeight:700,letterSpacing:"0.12em",color:"#c9a84c"}}>UNOPPOSED ROLL PROCESSOR</div>
            <div style={{fontSize:10,color:"#64748b",letterSpacing:"0.06em",marginTop:2}}>North West Division, High Court of South Africa — Mahikeng</div>
          </div>
          <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            {matters.length>0&&<>
              <span style={{fontSize:11,padding:"3px 10px",borderRadius:12,background:"#1e293b",color:"#94a3b8",fontFamily:"monospace"}}>{matters.length} Matter{matters.length!==1?"s":""}</span>
              {doneCount>0&&<span style={{fontSize:11,padding:"3px 10px",borderRadius:12,background:"#14532d",color:"#4ade80",fontFamily:"monospace"}}>{doneCount} Assessed</span>}
            </>}
            <button onClick={()=>{localStorage.removeItem("zanwhc_api_key");setApiKey("");}}
              style={{fontSize:10,padding:"4px 10px",background:"transparent",border:"1px solid #33415555",
                color:"#475569",borderRadius:4,cursor:"pointer",fontFamily:"monospace"}}>
              Change Key
            </button>
          </div>
        </div>
      </header>

      {/* MAIN */}
      {matters.length===0 ? (
        <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div
            onDragOver={e=>{e.preventDefault();setDragOver(true);}}
            onDragLeave={()=>setDragOver(false)}
            onDrop={handleDrop}
            onClick={()=>fileRef.current.click()}
            style={{maxWidth:580,width:"100%",border:`2px dashed ${dragOver?"#c9a84c":"#c9a84c44"}`,
              borderRadius:12,padding:"64px 40px",textAlign:"center",cursor:"pointer",
              background:dragOver?"#1a2744":"#0f1829",transition:"all 0.2s",animation:"fadeIn 0.4s ease"}}>
            <input ref={fileRef} type="file" accept=".pdf" multiple style={{display:"none"}} onChange={e=>addFiles(e.target.files)}/>
            <div style={{fontSize:56,marginBottom:16,color:"#c9a84c"}}>⚖</div>
            <div style={{fontSize:22,color:"#c9a84c",marginBottom:12,letterSpacing:"0.06em"}}>Upload Matter Bundles</div>
            <div style={{fontSize:13,color:"#475569",lineHeight:1.8,marginBottom:20}}>
              Drag and drop PDF bundles here, or click to browse.<br/>
              Supports: Unopposed motions · Default judgments · Divorces<br/>
              Interdicts · NCA matters · Evictions · PIE · Admissions
            </div>
            <div style={{display:"inline-block",fontSize:11,padding:"5px 16px",borderRadius:12,border:"1px solid #c9a84c44",color:"#c9a84c",letterSpacing:"0.1em"}}>
              Multiple files accepted
            </div>
          </div>
        </div>
      ) : (
        <div style={{display:"flex",flex:1,height:"calc(100vh - 61px)"}}>
          {/* SIDEBAR */}
          <aside style={{width:270,minWidth:200,background:"#0c1424",borderRight:"1px solid #1e3a5f",display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{display:"flex",alignItems:"center",padding:"11px 14px",borderBottom:"1px solid #1e3a5f",gap:8}}>
              <span style={{fontSize:10,letterSpacing:"0.2em",color:"#c9a84c",fontFamily:"monospace",flex:1}}>ROLL</span>
              <button onClick={()=>fileRef.current.click()}
                style={{fontSize:10,padding:"3px 9px",background:"transparent",border:"1px solid #c9a84c55",
                  color:"#c9a84c",borderRadius:3,cursor:"pointer",fontFamily:"monospace"}}>+ ADD</button>
              <input ref={fileRef} type="file" accept=".pdf" multiple style={{display:"none"}} onChange={e=>addFiles(e.target.files)}/>
            </div>
            <div style={{flex:1,overflowY:"auto"}}>
              {matters.map((m,idx)=>{
                const meta=m.result?recMeta(m.result.recommendation):null;
                const isActive=m.id===activeTab;
                return (
                  <div key={m.id} onClick={()=>setActiveTab(m.id)}
                    style={{display:"flex",alignItems:"center",padding:"10px 12px",cursor:"pointer",
                      borderBottom:"1px solid #0f1829",background:isActive?"#1a2744":"transparent",
                      transition:"background 0.15s",gap:8}}>
                    <div style={{fontSize:10,color:"#334155",fontFamily:"monospace",minWidth:18}}>{String(idx+1).padStart(2,"0")}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:11,color:isActive?"#e2e8f0":"#94a3b8",overflow:"hidden",textOverflow:"ellipsis",
                        whiteSpace:"nowrap",marginBottom:3,fontFamily:"monospace"}} title={m.name}>{m.name}</div>
                      <div style={{fontSize:10}}>
                        {m.status==="PENDING"&&<span style={{color:"#475569",fontFamily:"monospace"}}>◉ Pending</span>}
                        {m.status==="PROCESSING"&&<span style={{color:"#c9a84c",fontFamily:"monospace",animation:"pulse 1s infinite"}}>◉ Assessing…</span>}
                        {m.status==="ERROR"&&<span style={{color:"#f87171",fontFamily:"monospace"}}>◉ Error</span>}
                        {m.status==="DONE"&&meta&&<span style={{fontSize:9,padding:"2px 7px",borderRadius:3,
                          color:"#fff",background:meta.badge,fontFamily:"monospace",letterSpacing:"0.06em"}}>{meta.label}</span>}
                      </div>
                    </div>
                    <button onClick={e=>{e.stopPropagation();removeMatter(m.id);}}
                      style={{background:"none",border:"none",color:"#334155",cursor:"pointer",fontSize:16,padding:"0 2px",lineHeight:1}}>×</button>
                  </div>
                );
              })}
            </div>
            <div style={{padding:12,borderTop:"1px solid #1e3a5f"}}>
              <button onClick={processAll} disabled={processing||pendingCount===0}
                style={{width:"100%",padding:11,background:processing||pendingCount===0?"#1e293b":"linear-gradient(135deg,#92400e,#c9a84c)",
                  border:"none",borderRadius:6,color:processing||pendingCount===0?"#475569":"#fff",
                  fontSize:12,fontFamily:"Georgia,serif",letterSpacing:"0.05em",
                  cursor:processing||pendingCount===0?"not-allowed":"pointer",fontWeight:600,transition:"all 0.2s"}}>
                {processing?"⟳ Assessing…":`⚖ Assess ${pendingCount} Matter${pendingCount!==1?"s":""}`}
              </button>
            </div>
          </aside>

          {/* DETAIL */}
          <div style={{flex:1,overflow:"auto",display:"flex",flexDirection:"column"}}>
            {!activeMatter&&<EmptyDetail text="Select a matter from the roll."/>}
            {activeMatter?.status==="PENDING"&&<EmptyDetail icon="⚖" title={activeMatter.name} text="Ready to assess. Click 'Assess Matters' to process."/>}
            {activeMatter?.status==="PROCESSING"&&<LoadingDetail/>}
            {activeMatter?.status==="ERROR"&&<ErrorDetail error={activeMatter.error} onRetry={processAll}/>}
            {activeMatter?.status==="DONE"&&activeMatter.result&&<ResultPanel result={activeMatter.result}/>}
          </div>
        </div>
      )}
    </div>
  );
}

function EmptyDetail({icon,title,text}){
  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
      color:"#334155",padding:40,textAlign:"center",animation:"fadeIn 0.3s ease"}}>
      {icon&&<div style={{fontSize:52,color:"#1e3a5f",marginBottom:16}}>{icon}</div>}
      {title&&<div style={{fontSize:17,color:"#475569",marginBottom:8,fontFamily:"Georgia,serif"}}>{title}</div>}
      <div style={{fontSize:13,color:"#334155",maxWidth:360,lineHeight:1.7}}>{text}</div>
    </div>
  );
}

function LoadingDetail(){
  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",animation:"fadeIn 0.3s ease"}}>
      <div style={{width:44,height:44,borderRadius:"50%",border:"3px solid #1e3a5f",
        borderTopColor:"#c9a84c",animation:"spin 0.9s linear infinite",marginBottom:20}}/>
      <div style={{fontSize:17,color:"#475569",marginBottom:8,fontFamily:"Georgia,serif"}}>Assessing Papers…</div>
      <div style={{fontSize:12,color:"#334155",maxWidth:380,textAlign:"center",lineHeight:1.7}}>
        Reading bundle · Checking procedural compliance · Consulting SAFLII
      </div>
    </div>
  );
}

function ErrorDetail({error,onRetry}){
  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:40,textAlign:"center"}}>
      <div style={{fontSize:40,marginBottom:12}}>⚠</div>
      <div style={{color:"#f87171",fontFamily:"Georgia,serif",fontSize:16,marginBottom:8}}>Assessment Failed</div>
      <div style={{color:"#94a3b8",fontSize:12,maxWidth:440,lineHeight:1.7,marginBottom:20}}>{error}</div>
      <button onClick={onRetry} style={{padding:"9px 22px",background:"#1e3a5f",border:"1px solid #2563eb44",
        color:"#93c5fd",borderRadius:5,cursor:"pointer",fontSize:12,fontFamily:"monospace"}}>Retry</button>
    </div>
  );
}

// ── RESULT PANEL ──────────────────────────────────────────────────────────
function ResultPanel({result}){
  const [tab,setTab]=useState("assessment");
  const [copied,setCopied]=useState(false);
  const meta=recMeta(result.recommendation);

  const copyOrder=()=>{
    navigator.clipboard.writeText(result.draftOrder||"").then(()=>{
      setCopied(true); setTimeout(()=>setCopied(false),2000);
    });
  };

  const printOrder=()=>{
    const w=window.open("","_blank");
    w.document.write(`<html><head><title>Order — ${result.caseTitle||""}</title>
      <style>body{font-family:'Times New Roman',serif;font-size:12pt;max-width:700px;margin:60px auto;line-height:1.8}
      pre{font-family:'Times New Roman',serif;white-space:pre-wrap;font-size:12pt}</style></head>
      <body><pre>${(result.draftOrder||"").replace(/</g,"&lt;")}</pre></body></html>`);
    w.document.close(); w.print();
  };

  const tabs=[
    {id:"assessment",label:"📋 Assessment"},
    {id:"order",     label:"📜 Draft Order"},
    {id:"saflii",    label:`🔍 SAFLII (${(result.safliiCases||[]).length})`},
    {id:"queries",   label:`⚠ Queries (${(result.queries||[]).length})`},
  ];

  return (
    <div style={{display:"flex",flexDirection:"column",flex:1,animation:"fadeIn 0.3s ease"}}>
      {/* Result Header */}
      <div style={{padding:"18px 26px",display:"flex",alignItems:"flex-start",justifyContent:"space-between",
        gap:16,borderBottom:"1px solid #1e3a5f",flexWrap:"wrap",background:`${meta.bg}bb`}}>
        <div>
          <div style={{fontSize:9,padding:"2px 10px",borderRadius:3,color:"#fff",background:meta.badge,
            letterSpacing:"0.14em",fontFamily:"monospace",display:"inline-block",marginBottom:8}}>{meta.label}</div>
          <div style={{fontSize:19,color:"#e2e8f0",fontFamily:"Georgia,serif",marginBottom:5}}>{result.caseTitle||"Unnamed Matter"}</div>
          <div style={{fontSize:11,color:"#64748b",display:"flex",gap:6,flexWrap:"wrap"}}>
            {result.caseNumber&&<span>{result.caseNumber}</span>}
            {result.matterType&&<><span style={{color:"#334155"}}>·</span><span>{result.matterType}</span></>}
            {result.dateOnRoll&&<><span style={{color:"#334155"}}>·</span><span>{result.dateOnRoll}</span></>}
          </div>
        </div>
        <div style={{border:`1px solid ${meta.accent}`,borderRadius:6,padding:"9px 14px",fontSize:12,
          letterSpacing:"0.12em",fontFamily:"monospace",fontWeight:700,color:meta.accent,whiteSpace:"nowrap"}}>
          {result.rollDecision||result.recommendation}
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",borderBottom:"1px solid #1e3a5f",background:"#0c1424",padding:"0 10px",overflowX:"auto"}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{padding:"11px 18px",background:"none",border:"none",
              color:tab===t.id?"#c9a84c":"#475569",cursor:"pointer",fontSize:12,
              fontFamily:"Georgia,serif",borderBottom:tab===t.id?"2px solid #c9a84c":"2px solid transparent",
              transition:"all 0.15s",whiteSpace:"nowrap"}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Tab Content */}
      <div style={{flex:1,padding:"22px 26px",overflow:"auto"}}>
        {tab==="assessment"&&(
          <pre style={{fontFamily:"monospace",fontSize:12,lineHeight:1.8,color:"#cbd5e1",
            background:"#0c1424",padding:20,borderRadius:6,border:"1px solid #1e3a5f",
            whiteSpace:"pre-wrap",wordBreak:"break-word",margin:0}}>
            {result.assessmentReport||"No report generated."}
          </pre>
        )}

        {tab==="order"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
              <span style={{fontSize:10,color:"#c9a84c",letterSpacing:"0.15em",fontFamily:"monospace"}}>DRAFT ORDER — READY FOR SIGNING</span>
              <div style={{display:"flex",gap:8}}>
                <button onClick={copyOrder} style={{fontSize:11,padding:"6px 14px",background:"#1e293b",
                  border:"1px solid #2563eb44",color:"#93c5fd",borderRadius:4,cursor:"pointer",fontFamily:"monospace"}}>
                  {copied?"✓ Copied":"📋 Copy"}
                </button>
                <button onClick={printOrder} style={{fontSize:11,padding:"6px 14px",background:"#1e293b",
                  border:"1px solid #c9a84c33",color:"#c9a84c",borderRadius:4,cursor:"pointer",fontFamily:"monospace"}}>
                  🖨 Print
                </button>
              </div>
            </div>
            <pre style={{fontFamily:"'Times New Roman',serif",fontSize:13,lineHeight:2,color:"#e2e8f0",
              background:"#080d1a",padding:24,borderRadius:6,border:"1px solid #c9a84c33",
              whiteSpace:"pre-wrap",wordBreak:"break-word",margin:0}}>
              {result.draftOrder||"No draft order generated."}
            </pre>
            {result.amendments&&result.amendments.length>0&&(
              <div style={{marginTop:16,padding:16,background:"#7c2d1222",border:"1px solid #c2410c44",borderRadius:6}}>
                <div style={{fontSize:11,color:"#fb923c",marginBottom:10,fontFamily:"monospace",letterSpacing:"0.1em"}}>
                  ⚠ REQUIRED AMENDMENTS BEFORE SIGNING
                </div>
                {result.amendments.map((a,i)=>(
                  <div key={i} style={{fontSize:12,color:"#fca5a5",marginBottom:6,lineHeight:1.6}}>• {a}</div>
                ))}
              </div>
            )}
          </div>
        )}

        {tab==="saflii"&&(
          <div>
            {(!result.safliiCases||result.safliiCases.length===0)?(
              <div style={{color:"#334155",fontSize:13,fontFamily:"Georgia,serif",padding:20,textAlign:"center"}}>
                No SAFLII cases consulted — matter decided on settled law.
              </div>
            ):result.safliiCases.map((c,i)=>(
              <div key={i} style={{padding:16,background:"#0c1424",border:"1px solid #1e3a5f",borderRadius:6,marginBottom:12}}>
                <div style={{fontSize:13,color:"#c9a84c",fontFamily:"Georgia,serif",marginBottom:6}}>{c.citation}</div>
                <div style={{fontSize:12,color:"#94a3b8",lineHeight:1.65,marginBottom:10}}>{c.principle}</div>
                <a href={`https://www.saflii.org/cgi-bin/search.pl?query=${encodeURIComponent(c.citation)}&method=boolean`}
                  target="_blank" rel="noreferrer"
                  style={{fontSize:11,color:"#60a5fa",textDecoration:"none",fontFamily:"monospace"}}>
                  Search SAFLII →
                </a>
              </div>
            ))}
          </div>
        )}

        {tab==="queries"&&(
          <div>
            {(!result.queries||result.queries.length===0)?(
              <div style={{color:"#334155",fontSize:13,fontFamily:"Georgia,serif",padding:20,textAlign:"center"}}>
                No queries. Papers appear in order.
              </div>
            ):result.queries.map((q,i)=>(
              <div key={i} style={{display:"flex",gap:14,padding:14,background:"#0c1424",
                border:"1px solid #7c2d1244",borderRadius:6,marginBottom:10}}>
                <div style={{fontSize:14,color:"#fb923c",fontFamily:"monospace",fontWeight:700,minWidth:24}}>{i+1}</div>
                <div style={{fontSize:13,color:"#fca5a5",lineHeight:1.65}}>{q}</div>
              </div>
            ))}
            {result.confidence&&result.confidence!=="HIGH"&&(
              <div style={{marginTop:16,padding:"10px 16px",background:"#1e3a5f22",border:"1px solid #2563eb33",
                borderRadius:6,fontSize:12,color:"#60a5fa",fontFamily:"monospace"}}>
                <strong>Confidence: {result.confidence}</strong>
                {result.confidenceNote&&` — ${result.confidenceNote}`}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
